schemaVersion: 2.2.0
attributes:
  controller.devfile.io/storage-type: per-workspace
metadata:
  name: molecule-test
components:
  - name: dev-tools
    container:
      image: ghcr.io/wzzrd/techday-devspaces-ansible:2.16
      memoryRequest: 512M
      memoryLimit: 8Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      env:
        - name: HOME
          value: "/projects/home"
        - name: VSCODE_DEFAULT_WORKSPACE
          value: "/projects/molecule_test/.code-workspace"
        - name: ANSIBLE_COLLECTIONS_PATH
          value: "/projects/home/.ansible/collections:/usr/share/ansible/collections:/projects/molecule_test/collections"
commands:
  - id: install-molecule-dependencies
    exec:
      label: "Install molecule dependencies"
      commandLine: molecule dependency
      workingDir: ${PROJECT_SOURCE}
      component: dev-tools
  - id: run-molecule-create
    exec:
      label: "Create molecule container(s)"
      commandLine: molecule create
      workingDir: ${PROJECT_SOURCE}
      component: dev-tools
  - id: prepare-molecule
    composite:
      label: "Prepare for molecule testing"
      commands:
        - install-molecule-dependencies
        - run-molecule-create
      parallel: false
  - id: run-molecule-tests
    exec:
      label: "Run molecule test(s)"
      commandLine: molecule converge
      workingDir: ${PROJECT_SOURCE}
      component: dev-tools
      group:
        kind: test
        isDefault: true
  - id: build-workspace-container
    exec:
      label: "Build a new workspace container"
      commandLine: podman build -t quay.io/wzzrd/tech-day-demo:2026 -f Containerfile .
      workingDir: ${PROJECT_SOURCE}/workspace-image
      component: dev-tools
      group:
        kind: build
