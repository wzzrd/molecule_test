schemaVersion: 2.2.0
attributes:
  controller.devfile.io/storage-type: per-workspace
metadata:
  name: molecule-test
components:
  - name: dev-tools
    container:
      image: ghcr.io/wzzrd/techday-devspaces-ansible:2.16
      memoryRequest: 512M
      memoryLimit: 8Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      env:
        - name: HOME
          value: "/projects/home"
        - name: VSCODE_DEFAULT_WORKSPACE
          value: "/projects/molecule_test/.code-workspace"
        - name: ANSIBLE_COLLECTIONS_PATH
          value: "/projects/home/.ansible/collections:/usr/share/ansible/collections:/projects/molecule_test/collections"
